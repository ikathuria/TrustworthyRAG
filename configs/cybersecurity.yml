entity_types:
  MALWARE:
    description: Malware entities like rootkits, trojans, ransomware
    patterns:
      - 'trojan'
      - 'ransomware'
      - 'rootkit'
      - 'backdoor'
      - 'worm'
      - 'ginwui'
  VULNERABILITY:
    description: Security weaknesses or CVEs
    patterns:
      - 'CVE-\\d{4}-\\d{4,7}'
      - 'zero-day'
      - 'MS\\d{2}-\\d{3}'
  ORGANIZATION:
    description: Organizations like companies, hacker groups
    patterns:
      - 'NCPH'
      - 'Microsoft'
      - '[A-Z][a-z]+ University'
  PERSON:
    description: People mentioned as threat actors
  DATE:
    description: Date mentions, events timing

relation_types:
  CREATED_BY:
    description: Indicates creator relationship between entities
    entity_pairs:
      - [MALWARE, PERSON]
      - [MALWARE, ORGANIZATION]
    patterns:
      - 'created by'
      - 'authored by'
      - 'developed by'
  EXPLOITS:
    description: Malware or attack patterns exploiting targets
    entity_pairs:
      - [MALWARE, VULNERABILITY]
      - [MALWARE, ORGANIZATION]
    patterns:
      - 'exploits'
      - 'attacks'
  OCCURRED_ON:
    description: Event happened at certain date/time
    entity_pairs:
      - [MALWARE, DATE]
      - [ATTACK_PATTERN, DATE]

ner_label_map:
  ORG: ORGANIZATION
  PERSON: PERSON
  GPE: LOCATION
  DATE: DATE
